<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3E8BFF"/>
      <stop offset="1" stop-color="#0B47C2"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="64" y="64" width="896" height="896" rx="201" fill="url(#bg)"/>

  <!-- Simplified window frame, bolder strokes for legibility at tiny sizes -->
  <rect x="216" y="248" width="592" height="528" rx="64" fill="none" stroke="#FFFFFF" stroke-width="52" stroke-linejoin="round"/>
  <line x1="216" y1="360" x2="808" y2="360" stroke="#FFFFFF" stroke-width="52"/>

  <!-- Bold centering target at window center (512, 568): ring + ticks + dot -->
  <g stroke="#FFFFFF" stroke-width="46" stroke-linecap="round" fill="none">
    <circle cx="512" cy="568" r="78"/>
    <line x1="512" y1="438" x2="512" y2="476"/>
    <line x1="512" y1="660" x2="512" y2="698"/>
    <line x1="382" y1="568" x2="420" y2="568"/>
    <line x1="604" y1="568" x2="642" y2="568"/>
  </g>
  <circle cx="512" cy="568" r="30" fill="#FFFFFF"/>
</svg>
