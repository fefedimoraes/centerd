name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      SCHEME: centerd
      APP_NAME: centerd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "archive=${APP_NAME}-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Import self-signed certificate
        id: signing
        env:
          SELF_SIGNED_CERT_P12: ${{ secrets.SELF_SIGNED_CERT_P12 }}
          SELF_SIGNED_CERT_PASSWORD: ${{ secrets.SELF_SIGNED_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          # Create a dedicated, unlocked keychain for the signing identity.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the self-signed code-signing certificate (base64-encoded .p12).
          echo "$SELF_SIGNED_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$SELF_SIGNED_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make this keychain visible to codesign for the rest of the job.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"

          # Discover the imported identity (the keychain holds only this cert). We do NOT
          # use `-v -p codesigning` here: those filter to trust-validated identities, and a
          # self-signed cert in a fresh, untrusted keychain is not "valid" by that definition
          # even though it signs fine (trust is only checked at verification time). We match
          # the identity by its 40-char SHA-1 fingerprint, which is unambiguous.
          IDENTITY="$(security find-identity "$KEYCHAIN_PATH" | grep -oE '[0-9A-F]{40}' | head -n 1)"
          if [ -z "$IDENTITY" ]; then
            echo "error: no signing identity found in the keychain" >&2
            security find-identity "$KEYCHAIN_PATH" >&2
            exit 1
          fi
          echo "identity=${IDENTITY}" >> "$GITHUB_OUTPUT"

      - name: Build and sign .app
        run: |
          # Build a Release app without letting Xcode sign it; we sign manually below
          # with the self-signed identity.
          xcodebuild \
            -project centerd.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/dd" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CODE_SIGNING_ALLOWED=NO \
            build

          APP_PATH="$RUNNER_TEMP/dd/Build/Products/Release/${APP_NAME}.app"

          # Sign the bundle (and its nested code) with the self-signed identity.
          # No hardened runtime: it is unnecessary without notarization and would only
          # add library-validation friction for a self-signed build.
          codesign --force --deep --sign "${{ steps.signing.outputs.identity }}" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Package archive
        run: |
          APP_PATH="$RUNNER_TEMP/dd/Build/Products/Release/${APP_NAME}.app"
          ARCHIVE="$RUNNER_TEMP/${{ steps.version.outputs.archive }}"
          # ditto preserves the bundle structure, symlinks, and signature.
          ditto -c -k --keepParent "$APP_PATH" "$ARCHIVE"

      - name: Compute SHA-256
        id: shasum
        run: |
          ARCHIVE="$RUNNER_TEMP/${{ steps.version.outputs.archive }}"
          echo "sha256=$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/${{ steps.version.outputs.archive }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump Homebrew cask
        uses: macauley/action-homebrew-bump-cask@v1
        with:
          token: ${{ secrets.UPDATE_HOMEBREW_TAP }}
          tap: fefedimoraes/homebrew-tap
          cask: centerd
          tag: ${{ github.ref_name }}
          sha256: ${{ steps.shasum.outputs.sha256 }}
